<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Golden Dice Tests</title>
<style>body{font-family:monospace;padding:16px;background:#12100a;color:#fde68a} .pass{color:#22c55e} .fail{color:#ef4444}</style>
</head>
<body>
<pre id="out"></pre>
<script type="module">
import { saveSession, loadSessions, storeSessions } from '../js/sessions.js';
import { parseCSV, getDiceType, getFontSize } from '../js/dice-logic.js';

const out = document.getElementById('out');
let passed = 0, failed = 0;

function test(name, fn) {
  try { fn(); out.innerHTML += `<span class="pass">✓ ${name}</span>\n`; passed++; }
  catch(e) { out.innerHTML += `<span class="fail">✗ ${name}: ${e.message}</span>\n`; failed++; }
}
function eq(a, b) {
  if (JSON.stringify(a) !== JSON.stringify(b))
    throw new Error(`got ${JSON.stringify(a)}, want ${JSON.stringify(b)}`);
}

// ---- sessions tests ----
test('loadSessions returns defaults when localStorage empty', () => {
  localStorage.clear();
  const s = loadSessions();
  eq(s.length, 5);
  eq(s[0].csv, '1, X, 2, No Gol, Gol, Under, Over');
  eq(s[0].label, '1/X/2+');
});

test('saveSession prepends new session', () => {
  localStorage.clear();
  const s0 = loadSessions();
  const s1 = saveSession(s0, 'A, B, C');
  eq(s1[0].csv, 'A, B, C');
  eq(s1[0].label, 'A');
});

test('saveSession caps at 5', () => {
  localStorage.clear();
  let s = loadSessions(); // 5 defaults
  s = saveSession(s, 'Extra');
  eq(s.length, 5);
  eq(s[0].csv, 'Extra');
});

test('saveSession does not duplicate existing csv', () => {
  localStorage.clear();
  let s = loadSessions();
  const csv = s[2].csv;
  s = saveSession(s, csv);
  eq(s.length, 5);
  eq(s[0].csv, csv);
});

test('storeSessions persists to localStorage', () => {
  localStorage.clear();
  const s = loadSessions();
  storeSessions(s);
  const raw = localStorage.getItem('dice_sessions');
  if (!raw) throw new Error('nothing written to localStorage');
  const parsed = JSON.parse(raw);
  eq(parsed.length, 5);
});

// ---- dice-logic tests ----
test('parseCSV splits by comma and trims', () => {
  eq(parseCSV('A, B,  C '), ['A', 'B', 'C']);
});
test('parseCSV filters empty entries', () => {
  eq(parseCSV('A,,B, ,C'), ['A', 'B', 'C']);
});
test('parseCSV returns empty array for blank string', () => {
  eq(parseCSV('   '), []);
});
test('getDiceType 2 → d4', () => eq(getDiceType(2).type, 'd4'));
test('getDiceType 4 → d4', () => eq(getDiceType(4).type, 'd4'));
test('getDiceType 5 → d6', () => eq(getDiceType(5).type, 'd6'));
test('getDiceType 6 → d6', () => eq(getDiceType(6).type, 'd6'));
test('getDiceType 7 → d8', () => eq(getDiceType(7).type, 'd8'));
test('getDiceType 9 → d10', () => eq(getDiceType(9).type, 'd10'));
test('getDiceType 11 → d12', () => eq(getDiceType(11).type, 'd12'));
test('getDiceType 13 → d20', () => eq(getDiceType(13).type, 'd20'));
test('getDiceType 99 → d20', () => eq(getDiceType(99).type, 'd20'));
test('getFontSize 1 char → 120', () => eq(getFontSize('X'), 120));
test('getFontSize 2 chars → 120', () => eq(getFontSize('1X'), 120));
test('getFontSize 3 chars → 80', () => eq(getFontSize('ABC'), 80));
test('getFontSize 5 chars → 80', () => eq(getFontSize('Under'), 80));
test('getFontSize 6 chars → 52', () => eq(getFontSize('No Gol'), 52));

out.innerHTML += `\n<strong>${passed} passed, ${failed} failed</strong>\n`;
</script>
</body></html>
